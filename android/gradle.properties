# Gradle Memory (Increase for CI build)
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dkotlin.daemon.jvm.options=-Xmx2048m

# Disable Gradle daemon for CI
org.gradle.daemon=false
org.gradle.parallel=false
org.gradle.configureondemand=false

# AndroidX
android.useAndroidX=true
android.enableJetifier=true

# Build only small APK (IMPORTANT)
reactNativeArchitectures=armeabi-v7a

# Disable new architecture (fix codegen crash)
newArchEnabled=false

# Hermes JS engine
hermesEnabled=true
